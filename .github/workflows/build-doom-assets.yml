name: Build doom assets

# Run manually once to compile doom.wasm + doom.js and upload them alongside
# doom1.wad (shareware) to the `doom-assets-v1` release on this repo.
# After that, `cargo build --bin kuva --features cli,doom` downloads from there.
on:
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Pin to the version current when cloudflare/doom-wasm was last maintained.
          # Newer Emscripten breaks the old autoconf configure step.
          version: 3.1.46

      - name: Install build deps
        run: sudo apt-get install -y automake autoconf

      - name: Clone cloudflare/doom-wasm
        run: git clone --depth 1 https://github.com/cloudflare/doom-wasm doom-wasm-src

      - name: Build doom.wasm + doom.js
        working-directory: doom-wasm-src
        run: |
          # ac_cv_prog_cc_stdc=no: skip the C-standard detection macro that
          # fails when emcc is used as a cross-compiler — emcc already handles C99.
          # CFLAGS: silence implicit-function-declaration errors in old DOOM source.
          export ac_cv_prog_cc_stdc=no
          export CFLAGS="-Wno-implicit-function-declaration -Wno-implicit-int"
          ./scripts/build.sh
          ls -lh src/websockets-doom.*

      - name: Rename outputs
        run: |
          cp doom-wasm-src/src/websockets-doom.wasm doom.wasm
          cp doom-wasm-src/src/websockets-doom.js   doom.js

      - name: Download DOOM1.WAD shareware
        run: |
          # doom-wad-shareware is in Ubuntu multiverse — installs doom1.wad directly.
          # © id Software / ZeniMax Media. Free redistribution permitted (shareware).
          sudo add-apt-repository multiverse -y
          sudo apt-get update -q
          sudo apt-get install -y doom-wad-shareware
          cp /usr/share/games/doom/doom1.wad doom1.wad
          ls -lh doom1.wad

      - name: Create or update doom-assets-v1 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if present, then re-create.
          gh release delete doom-assets-v1 --yes 2>/dev/null || true
          gh release create doom-assets-v1 \
            --prerelease \
            --title "Doom assets v1 (build-time download, not a kuva release)" \
            --notes "$(cat <<'EOF'
          Pre-compiled assets used by \`cargo build --bin kuva --features cli,doom\`.

          Contents
          - **doom.wasm** / **doom.js** — Chocolate Doom compiled via Emscripten
            Source: https://github.com/cloudflare/doom-wasm (GPL v2)
          - **doom1.wad** — DOOM shareware episode 1
            © id Software / ZeniMax Media. Free redistribution permitted.

          These files are NOT part of the kuva library (MIT). They are downloaded
          automatically by build.rs and embedded into the SVG output of \`kuva doom\`.
          EOF
          )" \
            doom.wasm doom.js doom1.wad
