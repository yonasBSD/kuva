name: Docs

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.43/mdbook-v0.4.43-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory=/usr/local/bin

      - name: Build book
        run: mdbook build docs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache doom assets
        uses: actions/cache@v4
        with:
          path: doom-assets
          key: doom-assets-v1

      - name: Build kuva with doom feature
        run: cargo build --release --bin kuva --features cli,doom

      - name: Generate doom.svg
        run: ./target/release/kuva doom -o docs/book/doom.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
