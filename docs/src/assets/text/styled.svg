<svg xmlns="http://www.w3.org/2000/svg" width="500" height="260" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" fill="black"><rect width="100%" height="100%" fill="white" /><rect x="59" y="10" width="426.6" height="250" fill="#f8f9fa" /><rect x="59" y="10" width="426.6" height="250" fill="none" stroke="#dee2e6" stroke-width="1" /><text x="79" y="42" font-size="14" text-anchor="start" font-weight="bold">Study Summary</text><text x="79" y="69.9" font-size="12" text-anchor="start"><tspan font-weight="bold">Cohort:</tspan> 240 participants across three groups.</text><text x="79" y="97.8" font-size="12" text-anchor="start"><tspan font-weight="bold">Method:</tspan> Bivariate Gaussian sampling with<tspan font-style="italic"> group-specific</tspan></text><text x="79" y="116.4" font-size="12" text-anchor="start">centres and shared covariance structure.</text><text x="79" y="144.3" font-size="12" text-anchor="start"><tspan font-weight="bold">Finding:</tspan> Groups A and B show significant overlap (<tspan text-decoration="underline"> p =</tspan></text><text x="79" y="162.9" font-size="12" text-anchor="start"><tspan text-decoration="underline">0.032</tspan> ), while Group C is well-separated from both (<tspan text-decoration="underline"> p &lt;</tspan></text><text x="79" y="181.5" font-size="12" text-anchor="start"><tspan text-decoration="underline">0.001</tspan> ).</text></svg>