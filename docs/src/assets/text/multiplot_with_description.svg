 4.7</tspan> | Mean Y:<tspan font-weight="bold"> 3.6</tspan></text><text x="77" y="297.2" font-size="12" text-anchor="start">Groups are well-separated in 2D space; B–C separation is</text><text x="77" y="315.8" font-size="12" text-anchor="start">primarily driven by X, while A–B and A–C separations are</text><text x="77" y="334.40000000000003" font-size="12" text-anchor="start">driven by Y.</text></g><text x="513" y="403" font-size="16" text-anchor="start" font-weight="bold">D</text></svg>