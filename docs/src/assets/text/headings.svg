<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" fill="black"><rect width="100%" height="100%" fill="white" /><text x="240" y="27.400000000000002" font-size="18" text-anchor="middle">Markup Showcase</text><text x="79" y="76" font-size="16" text-anchor="start" font-weight="bold">Results</text><text x="79" y="105.76" font-size="12" text-anchor="start">Three experimental conditions were evaluated.</text><text x="79" y="133.66" font-size="14" text-anchor="start" font-weight="bold">Primary endpoint</text><text x="79" y="159.70000000000002" font-size="12" text-anchor="start"><tspan font-weight="bold">Mean response time:</tspan> 342 ms (95% CI: 318–366)</text><line x1="79" y1="182.8" x2="445.6" y2="182.8" stroke="#cccccc" stroke-width="1" /><text x="79" y="206.20000000000002" font-size="14" text-anchor="start" font-weight="bold">Secondary endpoint</text><text x="79" y="232.24" font-size="12" text-anchor="start"><tspan font-weight="bold">Accuracy:</tspan> 94.2% across all conditions.</text><text x="79" y="250.84" font-size="12" text-anchor="start">Error rate did not differ significantly between groups.</text></svg>